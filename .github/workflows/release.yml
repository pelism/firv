name: Release
on:
  push:
    branches:
      - main

jobs:
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.gitversion.outputs.FullSemVer }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup GitVersion
        uses: gittools/actions/gitversion/setup@v0
        with:
          versionSpec: '6.0.x'

      - name: determine version via GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0

      - name: create GitHub release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.gitversion.outputs.FullSemVer }}
          release_name: "firv v${{ steps.gitversion.outputs.FullSemVer }}"
          body: ''
          draft: false
          prerelease: false

  release:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: bump package version
        run: npm version ${{ needs.prepare-release.outputs.version }} --no-git-tag-version

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: install frontend dependencies
        run: npm install

      - name: sync version from package.json
        run: npm run sync:version

      - name: run frontend tests
        run: npm test

      - name: run rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Build, Sign, and Deploy Tauri App
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "firv v__VERSION__"
          releaseId: ${{ needs.prepare-release.outputs.release_id }}

      - name: upload standalone exe (windows only)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/firv.exe
          tag_name: v${{ needs.prepare-release.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
